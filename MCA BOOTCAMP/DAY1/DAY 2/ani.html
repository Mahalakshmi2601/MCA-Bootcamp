<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ANIMATION</title>
<style>
    
    img{
        animation: ball 5s infinite;
    }
    @keyframes ball{
        0%{
            transform: translateY(-500px)rotate(360deg);
        }
        50%{
            transform: translateY(500px)rotate(220deg);
        }
        75%{
            transform: translateY(700px)rotate(320deg);
        }
        100%{
            transform: translateY(700px)rotate(360deg);
        }
    }

</style>
</head>
<body>
    <div class="img">
        <img src="https://png.pngtree.com/png-vector/20241229/ourmid/pngtree-football-or-soccer-ball-on-transparent-background-png-image_14972374.png" alt="">
    </div>
</body>
